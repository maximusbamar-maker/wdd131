<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Open Graph (Facebook, LinkedIn, etc.) -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Character Card">
        <meta property="og:description" content="Character information for Snortleblat">
        <meta property="og:url" content="Character information for Snortleblat">
        <meta property="og:image" content="Snortleblat, the crocodile like swamp beast diplomat">

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Character Card">
        <meta name="twitter:description" content="Character information for Snortleblat">
        <meta name="twitter:image" content="Snortleblat, the crocodile like swamp beast diplomat">

        <!-- One favicon (ICO works everywhere) -->
        <link rel="icon" href="/favicon.ico">

        <!-- One Apple Touch Icon (iOS home screen) -->
        <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

        <title>Character Card</title>
        <link href="styles/styles.css" rel="stylesheet">
        <script src="scripts/scripts.js" defer></script>
    </head>

    <body>
        <div class="card">
            <img class="image" src="images/snortleblat.webp" alt="Snortleblat, the crocodile like swamp beast diplomat">
            
            <h1 class="name">Snortleblat</h1>

            <div class="stats">
                
                <p><b>Class: </b><span id="class">Swamp Beast Diplomat</span></p>
                <p><b>Level: </b><span id="level">1</span></p>
                <p><b>Health: </b><span id="health">100</span></p>
            </div>

            <div class="buttons">
                <button id="attacked">Attacked</button>
                <button id="levelUp">Level Up</button>
            </div>
        </div>
    </body>
</html>
